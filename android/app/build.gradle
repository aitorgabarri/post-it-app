apply plugin: 'com.android.application'
// ✅ AÑADIDO: Este plugin activa Firebase en la APK
apply plugin: 'com.google.gms.google-services' 

android {
    // ✅ CORREGIDO: Ahora coincide con tu google-services.json
    namespace "com.mycompany.posit" 
    compileSdk 36

    defaultConfig {
        // ✅ CORREGIDO: Ahora coincide con tu google-services.json
        applicationId "com.mycompany.posit" 
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Capacitor lo necesita para las assets
             ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    
    // ✅ AÑADIDO: La librería de OneSignal para que la APK "escuche"
    implementation "com.onesignal:OneSignal:[4.8.5, 4.99.99]"

    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
}

// ✅ IMPORTANTE: Descomenta esto para que Capacitor cargue sus plugins
apply from: 'capacitor.build.gradle'